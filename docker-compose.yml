services:
  db:
    image: postgres:18                       # majeure epinglee (stable 18.x, juin 2026)
    container_name: fil-rouge-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}             # valeurs injectees depuis .env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql      # persistance hors du conteneur
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  qdrant: # base vectorielle du RAG, utile en M05
    image: qdrant/qdrant:v1.18.2
    ports:
      - "6333:6333" # REST + dashboard
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pg_data:
  qdrant_data:
